name: timelapse
description: Long-delay photo timelapse creator with ghost overlay alignment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.0

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Camera
  camera: ^0.10.5+9

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Background tasks
  workmanager: ^0.9.0

  # GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  flutter_compass: ^0.8.0

  # Export (using min variant — no GPL)
  ffmpeg_kit_flutter_new_min: ^3.1.0

  # Image utilities
  image: ^4.2.0

  # UI / UX
  intl: ^0.19.0
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - splash.png
